name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: false
      - run: uv sync
      - run: uv run pytest --cov=solmate_optimizer.logic --cov-report=term-missing
